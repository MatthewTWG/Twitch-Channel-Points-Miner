services:
  miner:
    image: mpforce1/twitch-channel-points-miner:latest
    build:
      context: .
      target: miner
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
    volumes:
      - ./analytics:/usr/src/app/analytics
      - ./cookies:/usr/src/app/cookies
      - ./logs:/usr/src/app/logs
      - ./run.py:/usr/src/app/run.py:ro
    ports:
      - "5000:5000"

  tester:
    build:
      context: .
      target: tester
