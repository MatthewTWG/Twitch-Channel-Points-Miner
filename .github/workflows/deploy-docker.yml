name: deploy-docker

on:
  workflow_dispatch:

jobs:
  deploy-docker:
    name: Deploy To Docker Hub + Release To GitHub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2

      - name: Login to DockerHub
        uses: docker/login-action@v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Read Version
        # Gets the version number from the proproject.toml
        id: getversion
        run: echo "version=$(cat pyproject.toml | grep "version" | cut -d'"' -f 2)" >> $GITHUB_OUTPUT

      - name: Docker meta
        # Create image tags and labels
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: |
            mpforce1/twitch-channel-points-miner
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.getversion.outputs.version }}
            type=sha
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push AMD64, ARM64, ARMv7
        # Builds and pushes for all platforms to all registries
        id: docker_build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          target: miner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull GHCR Image
        # Pull images for each platform
        run: |
          docker pull --platform=linux/amd64 ghcr.io/mpforce1/twitch-channel-points-miner:latest
          docker pull --platform=linux/arm64 ghcr.io/mpforce1/twitch-channel-points-miner:latest
          docker pull --platform=linux/arm/v7 ghcr.io/mpforce1/twitch-channel-points-miner:latest

      - name: Create Tarballs
        # Saves the images to separate gzipped tarballs
        run: |
          mkdir output
          docker image save \
          --platform=linux/amd64 \
          ghcr.io/mpforce1/twitch-channel-points-miner:latest | \
          gzip > ./output/twitch-channel-points-miner-linux-amd64.tar.gz
          docker image save \
          --platform=linux/arm64 \
          ghcr.io/mpforce1/twitch-channel-points-miner:latest | \
          gzip > ./output/twitch-channel-points-miner-linux-arm64.tar.gz
          docker image save \
          --platform=linux/arm/v7 \
          ghcr.io/mpforce1/twitch-channel-points-miner:latest | \
          gzip > ./output/twitch-channel-points-miner-linux-arm-v7.tar.gz

      - name: Create GitHub Release
        # Create a draft release for manual review
        uses: softprops/action-gh-release@v2.5.0
        with:
          generate_release_notes: true
          files: ./output/**/*
          draft: true

      - name: Docker Hub Description
        # Update docker hub description
        uses: peter-evans/dockerhub-description@v5.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: mpforce1/twitch-channel-points-miner

      - name: Image digest AMD64, ARM64, ARMv7
        # Print digest
        run: echo ${{ steps.docker_build.outputs.digest }}
