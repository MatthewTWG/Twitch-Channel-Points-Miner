# Deploys Docker images from a manual trigger
name: deploy-docker-manually

# Triggered manually
on:
  workflow_dispatch:

jobs:
  deploy-docker:
    name: Deploy To Docker Hub + GitHub Container Registry
    runs-on: ubuntu-latest

    # Packages write permission to allow publishing GitHub package
    permissions:
      packages: write

    steps:
      - name: Get Next Version
        id: getnextversion
        uses: ./.github/actions/get-version-action.yml

      - name: deploy
        uses: ./.github/actions/deploy-action.yml
        with:
          version: ${{ steps.getnextversion.outputs.version }}
