name: Deploy To Docker Hub & GitHub Container Registry
description: |
  Reusable action that can build and publish Docker images,
  update the Docker Hub description,
  and tag the Git repository with the version number.

inputs:
  docker_hub_username:
    description: "Username used to log in to the Docker Hub registry"
    required: true
  docker_hub_token:
    description: "Token used to log in to the Docker Hub Registry"
    required: true
  ghcr_token:
    description: "Personal Access Token used to log in to the GitHub Container Registry"
  version:
    description: "Next Version Number"
    required: true

runs:
  using: "composite"
  steps:
    - name: Login to DockerHub
      uses: docker/login-action@v3.7.0
      with:
        username: ${{ inputs.docker_hub_username }}
        password: ${{ inputs.docker_hub_token }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.ghcr_token }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.12.0

    - name: Docker meta
      # Create image tags and labels
      id: meta
      uses: docker/metadata-action@v5.10.0
      with:
        images: |
          mpforce1/twitch-channel-points-miner
          ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=${{ inputs.version }}
          type=sha
          type=sha,format=long
          type=raw,value=latest

    - name: Build and push AMD64, ARM64, ARMv7
      # Builds and pushes for all platforms to all registries
      id: docker_build
      uses: docker/build-push-action@v6.18.0
      with:
        context: .
        target: miner
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker Hub Description
      # Update docker hub description
      uses: peter-evans/dockerhub-description@v5.0.0
      with:
        username: ${{ inputs.docker_hub_username }}
        password: ${{ inputs.docker_hub_token }}
        repository: mpforce1/twitch-channel-points-miner
        enable-url-completion: true

    - name: Create Tag
      # Creates a tag for the new version
      shell: bash
      run: |
        git config user.name "GitHub Actions"
        git config user.email "github-actions@users.noreply.github.com"
        git tag ${{ inputs.version }}
        git push origin ${{ inputs.version }}

    - name: Image digest AMD64, ARM64, ARMv7
      # Print digest
      shell: bash
      run: echo ${{ steps.docker_build.outputs.digest }}
